# LLaMA-Factory 等价配置 (与 train_lora.py 训出来的模型一致)
# 用法: llamafactory-cli train train/configs/qwen_lora.yaml

### Model
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

### Dataset
dataset: finlora_sentiment       # 需要在 LLaMA-Factory data/dataset_info.json 注册
template: qwen
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 4

### Output
output_dir: checkpoints/finlora-qwen2.5-1.5b-lf
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### Train
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

### Eval
val_size: 0.1
per_device_eval_batch_size: 8
eval_strategy: steps
eval_steps: 100
